parameters:
  mimir:
    =_metadata:
      multi_instance: true
      multi_tenant: true

    namespace:
      name: syn-mimir
      create: true
      metadata: {}

    charts:
      mimir-distributed:
        source: https://grafana.github.io/helm-charts
        version: v5.8.0

    images:
      mimir:
        registry: docker.io
        repository: grafana/mimir
      memcached:
        registry: docker.io
        repository: library/memcached
      memcachedExporter:
        registry: docker.io
        repository: prom/memcached-exporter
      nginx:
        registry: docker.io
        repository: nginxinc/nginx-unprivileged
      rolloutOperator:
        registry: docker.io
        repository: grafana/rollout-operator

    preset: extra-small

    components:
      # Read Path
      querier:
        enabled: true
      queryFrontend:
        enabled: true
      queryScheduler:
        enabled: true
      storeGateway:
        enabled: true
        storage: {}
      # Write Path
      distributor:
        enabled: true
      ingester:
        enabled: true
        storage: {}
      # Backend
      compactor:
        enabled: true
      rolloutOperator:
        enabled: true
      # Ingress
      gateway:
        enabled: true
      nginx:
        enabled: false
      # Optional
      alertmanager:
        enabled: true
        storage: {}
      overridesExporter:
        enabled: true
      ruler:
        enabled: true

    caches:
      chunks:
        enabled: true
      index:
        enabled: true
      metadata:
        enabled: true
      results:
        enabled: true

    global:
      nodeSelector: {}
      zoneAwareReplication:
        enabled: false
        zones: []
      # Allows overriding the resolver for the mimir-distributed chart, if using nginx as the frontend.
      nginxResolverOverride: ''

    s3:
      bucketPrefix: ${_instance}
      endpoint: null
      region: null
      insecure: false
      auth:
        accessKeyId: '?{vaultkv:${cluster:tenant}/${cluster:name}/${_instance}/s3_access_key}'
        secretAccessKey: '?{vaultkv:${cluster:tenant}/${cluster:name}/${_instance}/s3_secret_key}'
        #increase if auth credentials change
        secretVersion: 0

    ingress:
      enabled: false
      tls:
        enabled: true
        clusterIssuer: 'letsencrypt-production'
        key: null
        cert: null
      url: ''

    basicAuth:
      enabled: false
      htpasswd: '?{vaultkv:${cluster:tenant}/${cluster:name}/${_instance}/htpasswd}'

    config:
      tenantFederation: false
      haTracker: false
      haLabels:
        cluster: cluster_id
        replica: prometheus_replica
      haStore:
        type: etcd

    monitoring: true
    alerts:
      additionalRules: {}
      patchRules:
        ignoreNames: []
        patches: {}

    secrets: {}

    helm_values: {}

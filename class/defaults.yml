parameters:
  mimir:
    =_metadata:
      multi_instance: true
      multi_tenant: true

    name: ${_instance}
    namespace:
      name: syn-mimir
      create: true
      metadata: {}

    secrets:
      mimir-bucket-secret:
        stringData:
          S3_ACCESS_KEY_ID: null
          S3_SECRET_ACCESS_KEY: null
          S3_ENDPOINT: null

    charts:
      mimir-distributed:
        source: https://grafana.github.io/helm-charts
        version: v4.3.0

    images:
      mimir:
        registry: docker.io
        repository: grafana/mimir
        tag: 2.7.1
      memcached:
        registry: docker.io
        repository: library/memcached
        tag: 1.6.17-alpine
      memcachedExporter:
        registry: docker.io
        repository: prom/memcached-exporter
        tag: v0.6.0
      nginx:
        registry: docker.io
        repository: nginxinc/nginx-unprivileged
        tag: 1.22-alpine
      rolloutOperator:
        registry: docker.io
        repository: grafana/rollout-operator
        tag: v0.2.0

    preset: extra-small

    components:
      # Read Path
      querier:
        enabled: true
      queryFrontend:
        enabled: true
      queryScheduler:
        enabled: true
      storeGateway:
        enabled: true
        storage: {}
      # Write Path
      distributor:
        enabled: true
      ingester:
        enabled: true
        storage: {}
      # Backend
      compactor:
        enabled: true
      rolloutOperator:
        enabled: true
      # Ingress
      gateway:
        enabled: false
      nginx:
        enabled: true
      # Optional
      alertmanager:
        enabled: true
        storage: {}
      overridesExporter:
        enabled: true
      ruler:
        enabled: true

    caches:
      chunks:
        enabled: true
      index:
        enabled: true
      metadata:
        enabled: true
      results:
        enabled: true

    global:
      nodeSelector: {}
      zoneAwareReplication:
        enabled: false
        zones: []

    alerts:
      additionalRules: {}
      patchRules:
        ignoreNames: []
        patches: {}

    # Allows overriding the resolver for the mimir-distributed chart, if using nginx as the frontend.
    nginx_resolver_override: ""

    helm_values:
      global:
        extraEnvFrom:
          - secretRef:
              name: mimir-bucket-secret
        podAnnotations:
          # increase if bucket secrets change
          bucketSecretVersion: "0"

      mimir:
        structuredConfig:
          alertmanager_storage:
            backend: s3
            s3:
              bucket_name: ${mimir:name}-alertmanager-bucket
              access_key_id: \${S3_ACCESS_KEY_ID}
              endpoint: \${S3_ENDPOINT}
              secret_access_key: \${S3_SECRET_ACCESS_KEY}
          blocks_storage:
            backend: s3
            s3:
              bucket_name: ${mimir:name}-blocks-bucket
              access_key_id: \${S3_ACCESS_KEY_ID}
              endpoint: \${S3_ENDPOINT}
              secret_access_key: \${S3_SECRET_ACCESS_KEY}
          ruler_storage:
            backend: s3
            s3:
              bucket_name: ${mimir:name}-ruler-bucket
              access_key_id: \${S3_ACCESS_KEY_ID}
              endpoint: \${S3_ENDPOINT}
              secret_access_key: \${S3_SECRET_ACCESS_KEY}

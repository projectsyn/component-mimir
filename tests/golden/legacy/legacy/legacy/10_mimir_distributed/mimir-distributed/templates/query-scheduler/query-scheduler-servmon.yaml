apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/component: query-scheduler
    app.kubernetes.io/instance: legacy
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/version: 2.17.0
    helm.sh/chart: mimir-distributed-5.8.0
  name: legacy-mimir-query-scheduler
  namespace: legacy
spec:
  endpoints:
    - port: http-metrics
      relabelings:
        - action: replace
          replacement: legacy/query-scheduler
          sourceLabels:
            - job
          targetLabel: job
        - action: replace
          replacement: legacy
          targetLabel: cluster
      scheme: http
  namespaceSelector:
    matchNames:
      - legacy
  selector:
    matchExpressions:
      - key: prometheus.io/service-monitor
        operator: NotIn
        values:
          - 'false'
    matchLabels:
      app.kubernetes.io/component: query-scheduler
      app.kubernetes.io/instance: legacy
      app.kubernetes.io/name: mimir

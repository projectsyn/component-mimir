apiVersion: apps/v1
kind: StatefulSet
metadata:
  annotations:
    grafana.com/rollout-downscale-leader: mimir-ingester-zone-a
    rollout-max-unavailable: '50'
  labels:
    app.kubernetes.io/component: ingester
    app.kubernetes.io/instance: mimir
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/part-of: memberlist
    app.kubernetes.io/version: 2.17.0
    helm.sh/chart: mimir-distributed-5.8.0
    name: ingester-zone-a
    rollout-group: ingester
    zone: zone-a
  name: mimir-ingester-zone-a
  namespace: syn-mimir
spec:
  podManagementPolicy: Parallel
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: ingester
      app.kubernetes.io/instance: mimir
      app.kubernetes.io/name: mimir
      rollout-group: ingester
      zone: zone-a
  serviceName: mimir-ingester-headless
  template:
    metadata:
      annotations:
        bucketSecretVersion: '0'
        checksum/config: a3df40a9efd279eef6efce6905b020f1f86f67afd26d739fbd208f5dc9ea2077
      labels:
        app.kubernetes.io/component: ingester
        app.kubernetes.io/instance: mimir
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: mimir
        app.kubernetes.io/part-of: memberlist
        app.kubernetes.io/version: 2.17.0
        helm.sh/chart: mimir-distributed-5.8.0
        name: ingester-zone-a
        rollout-group: ingester
        zone: zone-a
      namespace: syn-mimir
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: rollout-group
                    operator: In
                    values:
                      - ingester
                  - key: zone
                    operator: NotIn
                    values:
                      - zone-a
              topologyKey: kubernetes.io/hostname
      containers:
        - args:
            - -target=ingester
            - -config.expand-env=true
            - -config.file=/etc/mimir/mimir.yaml
            - -ingester.ring.instance-availability-zone=zone-a
            - -memberlist.abort-if-fast-join-fails=true
          env:
            - name: GOMAXPROCS
              value: '8'
          envFrom:
            - secretRef:
                name: mimir-bucket-secret
          image: docker.io/grafana/mimir:latest
          imagePullPolicy: IfNotPresent
          livenessProbe: null
          name: ingester
          ports:
            - containerPort: 8080
              name: http-metrics
              protocol: TCP
            - containerPort: 9095
              name: grpc
              protocol: TCP
            - containerPort: 7946
              name: memberlist
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 60
          resources:
            limits:
              memory: 12Gi
            requests:
              cpu: 3.5
              memory: 8Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /etc/mimir
              name: config
            - mountPath: /var/mimir
              name: runtime-config
            - mountPath: /data
              name: storage
            - mountPath: /active-query-tracker
              name: active-queries
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: mimir
      terminationGracePeriodSeconds: 1200
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: ingester
              app.kubernetes.io/instance: mimir
              app.kubernetes.io/name: mimir
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
      volumes:
        - configMap:
            items:
              - key: mimir.yaml
                path: mimir.yaml
            name: mimir-config
          name: config
        - configMap:
            name: mimir-runtime
          name: runtime-config
        - emptyDir: {}
          name: active-queries
  updateStrategy:
    type: OnDelete
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi

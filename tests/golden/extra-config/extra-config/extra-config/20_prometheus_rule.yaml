apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    name: mimir-custom
  name: mimir-custom
  namespace: extra-config
spec:
  groups:
    - name: mimir-custom.rules
      rules:
        - alert: CustomTestAlert
          annotations:
            summary: Test alert
          expr: vector(1) == 0
          for: 1h
          labels:
            severity: warning
            syn: 'true'
            syn_component: extra-config

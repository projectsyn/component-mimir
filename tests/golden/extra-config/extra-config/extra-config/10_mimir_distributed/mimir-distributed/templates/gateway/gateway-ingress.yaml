apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    app.kubernetes.io/component: gateway
    app.kubernetes.io/instance: extra-config
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/version: 2.17.0
    helm.sh/chart: mimir-distributed-5.8.0
  name: extra-config-mimir-gateway
  namespace: extra-config
spec:
  rules:
    - host: metrics-receive.example.com
      http:
        paths:
          - backend:
              service:
                name: mimir-nginx
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - metrics-receive.example.com
      secretName: metrics-receive-example-com-tls

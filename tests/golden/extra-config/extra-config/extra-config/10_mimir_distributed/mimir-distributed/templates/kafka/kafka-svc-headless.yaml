apiVersion: v1
kind: Service
metadata:
  annotations: {}
  labels:
    app.kubernetes.io/component: kafka
    app.kubernetes.io/instance: extra-config
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/version: 3.0.4
    helm.sh/chart: mimir-distributed-6.0.6
    prometheus.io/service-monitor: 'false'
  name: extra-config-mimir-kafka-headless
  namespace: extra-config
spec:
  clusterIP: None
  ports:
    - name: kafka
      port: 9092
      protocol: TCP
      targetPort: kafka
    - name: controller
      port: 9093
      protocol: TCP
      targetPort: controller
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/component: kafka
    app.kubernetes.io/instance: extra-config
    app.kubernetes.io/name: mimir
  type: ClusterIP

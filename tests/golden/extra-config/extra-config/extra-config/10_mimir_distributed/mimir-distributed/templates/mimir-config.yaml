apiVersion: v1
data:
  mimir.yaml: |2

    activity_tracker:
      filepath: /active-query-tracker/activity.log
    alertmanager:
      data_dir: /data
      enable_api: true
      external_url: /alertmanager
      fallback_config_file: /configs/alertmanager_fallback_config.yaml
    alertmanager_storage:
      backend: s3
      s3:
        access_key_id: ${S3_ACCESS_KEY_ID}
        bucket_name: extra-config-alertmanager-bucket
        endpoint: sos-ch-dk-2.exo.io
        secret_access_key: ${S3_SECRET_ACCESS_KEY}
    blocks_storage:
      backend: s3
      bucket_store:
        chunks_cache:
          backend: memcached
          memcached:
            addresses: dnssrvnoa+extra-config-mimir-chunks-cache.extra-config.svc.cluster.local.:11211
            max_idle_connections: 150
            max_item_size: 1048576
            timeout: 750ms
        index_cache:
          backend: memcached
          memcached:
            addresses: dnssrvnoa+extra-config-mimir-index-cache.extra-config.svc.cluster.local.:11211
            max_idle_connections: 150
            max_item_size: 5242880
            timeout: 750ms
        metadata_cache:
          backend: memcached
          memcached:
            addresses: dnssrvnoa+extra-config-mimir-metadata-cache.extra-config.svc.cluster.local.:11211
            max_idle_connections: 150
            max_item_size: 1048576
        sync_dir: /data/tsdb-sync
      s3:
        access_key_id: ${S3_ACCESS_KEY_ID}
        bucket_name: extra-config-blocks-bucket
        endpoint: sos-ch-dk-2.exo.io
        secret_access_key: ${S3_SECRET_ACCESS_KEY}
      tsdb:
        dir: /data/tsdb
        head_compaction_interval: 15m
        wal_replay_concurrency: 3
    compactor:
      compaction_interval: 30m
      data_dir: /data
      deletion_delay: 2h
      first_level_compaction_wait_period: 25m
      max_closing_blocks_concurrency: 2
      max_opening_blocks_concurrency: 4
      sharding_ring:
        heartbeat_period: 1m
        heartbeat_timeout: 4m
        wait_stability_min_duration: 1m
      symbols_flushers_concurrency: 4
    distributor:
      ha_tracker:
        enable_ha_tracker: true
        ha_tracker_failover_timeout: 60s
        kvstore:
          etcd:
            endpoints:
            - https://mimir-kv-etcd-0.mimir-kv-etcd-headless.mimir-kv:2379
            - https://mimir-kv-etcd-1.mimir-kv-etcd-headless.mimir-kv:2379
            - https://mimir-kv-etcd-2.mimir-kv-etcd-headless.mimir-kv:2379
            password: t-silent-test-1234/c-green-test-1234/mimir-kv/etcd_root_password
            tls_enabled: true
            tls_insecure_skip_verify: true
            username: root
          store: etcd
      ring:
        heartbeat_period: 1m
        heartbeat_timeout: 4m
    frontend:
      cache_results: true
      parallelize_shardable_queries: true
      query_sharding_target_series_per_shard: 2500
      results_cache:
        backend: memcached
        memcached:
          addresses: dnssrvnoa+extra-config-mimir-results-cache.extra-config.svc.cluster.local.:11211
          max_item_size: 5242880
          timeout: 500ms
      scheduler_address: extra-config-mimir-query-scheduler-headless.extra-config.svc:9095
    frontend_worker:
      grpc_client_config:
        max_send_msg_size: 419430400
      scheduler_address: extra-config-mimir-query-scheduler-headless.extra-config.svc:9095
    ingester:
      ring:
        final_sleep: 0s
        heartbeat_period: 2m
        heartbeat_timeout: 10m
        num_tokens: 512
        tokens_file_path: /data/tokens
        unregister_on_shutdown: false
        zone_awareness_enabled: true
    ingester_client:
      grpc_client_config:
        max_recv_msg_size: 104857600
        max_send_msg_size: 104857600
    limits:
      accept_ha_samples: true
      ha_cluster_label: cluster_id
      ha_replica_label: prometheus_replica
      max_cache_freshness: 10m
      max_query_parallelism: 240
      max_total_query_length: 12000h
    memberlist:
      abort_if_cluster_join_fails: false
      compression_enabled: false
      join_members:
      - dns+extra-config-mimir-gossip-ring.extra-config.svc.cluster.local.:7946
    querier:
      max_concurrent: 16
    query_scheduler:
      max_outstanding_requests_per_tenant: 800
    ruler:
      alertmanager_url: dnssrvnoa+http://_http-metrics._tcp.extra-config-mimir-alertmanager-headless.extra-config.svc.cluster.local./alertmanager
      enable_api: true
      rule_path: /data
      tenant_federation:
        enabled: true
    ruler_storage:
      backend: s3
      cache:
        backend: memcached
        memcached:
          addresses: dnssrvnoa+extra-config-mimir-metadata-cache.extra-config.svc.cluster.local.:11211
          max_item_size: 1048576
          timeout: 500ms
      s3:
        access_key_id: ${S3_ACCESS_KEY_ID}
        bucket_name: extra-config-ruler-bucket
        endpoint: sos-ch-dk-2.exo.io
        secret_access_key: ${S3_SECRET_ACCESS_KEY}
    runtime_config:
      file: /var/mimir/runtime.yaml
    store_gateway:
      sharding_ring:
        heartbeat_period: 1m
        heartbeat_timeout: 10m
        kvstore:
          prefix: multi-zone/
        tokens_file_path: /data/tokens
        unregister_on_shutdown: false
        wait_stability_min_duration: 1m
        zone_awareness_enabled: true
    tenant_federation:
      enabled: true
    usage_stats:
      installation_mode: helm
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: extra-config
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/version: 2.17.0
    helm.sh/chart: mimir-distributed-5.8.0
  name: extra-config-mimir-config
  namespace: extra-config

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/instance: extra-config
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: rollout-operator
    app.kubernetes.io/version: v0.28.0
    helm.sh/chart: rollout-operator-0.30.0
  name: extra-config-rollout-operator
  namespace: extra-config
rules:
  - apiGroups:
      - ''
    resources:
      - pods
    verbs:
      - list
      - get
      - watch
      - delete
  - apiGroups:
      - apps
    resources:
      - statefulsets
    verbs:
      - list
      - get
      - watch
      - patch
  - apiGroups:
      - apps
    resources:
      - statefulsets/status
    verbs:
      - update

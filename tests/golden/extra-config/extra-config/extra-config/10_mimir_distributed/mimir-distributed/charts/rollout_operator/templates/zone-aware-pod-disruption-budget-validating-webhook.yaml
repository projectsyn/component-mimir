apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  labels:
    app.kubernetes.io/instance: extra-config
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: rollout-operator
    app.kubernetes.io/version: v0.32.0
    grafana.com/inject-rollout-operator-ca: 'true'
    grafana.com/namespace: extra-config
    helm.sh/chart: rollout-operator-0.37.1
  name: zpdb-validation-extra-config
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: extra-config-rollout-operator
        namespace: extra-config
        path: /admission/zpdb-validation
        port: 443
    failurePolicy: Fail
    name: zpdb-validation-extra-config.grafana.com
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: extra-config
    rules:
      - apiGroups:
          - rollout-operator.grafana.com
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - zoneawarepoddisruptionbudgets
        scope: Namespaced
    sideEffects: None

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: extra-config
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: rollout-operator
    app.kubernetes.io/version: v0.32.0
    helm.sh/chart: rollout-operator-0.37.1
  name: extra-config-rollout-operator
  namespace: extra-config
spec:
  minReadySeconds: 10
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/instance: extra-config
      app.kubernetes.io/name: rollout-operator
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: extra-config
        app.kubernetes.io/name: rollout-operator
      namespace: extra-config
    spec:
      containers:
        - args:
            - -kubernetes.namespace=extra-config
            - -server-tls.enabled=true
            - -server-tls.self-signed-cert.secret-name=certificate
            - -server-tls.self-signed-cert.dns-name=extra-config-rollout-operator.extra-config.svc
          image: docker.io/grafana/rollout-operator:latest
          imagePullPolicy: IfNotPresent
          name: rollout-operator
          ports:
            - containerPort: 8001
              name: http-metrics
              protocol: TCP
            - containerPort: 8443
              name: https
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 5
            timeoutSeconds: 1
          resources:
            limits:
              memory: 200Mi
            requests:
              cpu: 100m
              memory: 100Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      nodeSelector:
        appuio.io/node-class: plus
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: extra-config-rollout-operator

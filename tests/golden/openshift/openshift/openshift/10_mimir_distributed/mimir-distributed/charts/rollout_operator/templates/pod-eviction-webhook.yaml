apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  labels:
    app.kubernetes.io/instance: openshift
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: rollout-operator
    app.kubernetes.io/version: v0.32.0
    grafana.com/inject-rollout-operator-ca: 'true'
    grafana.com/namespace: openshift
    helm.sh/chart: rollout-operator-0.37.1
  name: pod-eviction-openshift
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: openshift-rollout-operator
        namespace: openshift
        path: /admission/pod-eviction
        port: 443
    failurePolicy: Fail
    name: pod-eviction-openshift.grafana.com
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: openshift
    rules:
      - apiGroups:
          - ''
        apiVersions:
          - v1
        operations:
          - CREATE
        resources:
          - pods/eviction
        scope: Namespaced
    sideEffects: None

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/instance: openshift
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: rollout-operator
    app.kubernetes.io/version: v0.32.0
    helm.sh/chart: rollout-operator-0.37.1
  name: openshift-rollout-operator
  namespace: openshift
rules:
  - apiGroups:
      - ''
    resources:
      - pods
    verbs:
      - list
      - get
      - watch
      - delete
  - apiGroups:
      - apps
    resources:
      - statefulsets
    verbs:
      - list
      - get
      - watch
      - patch
  - apiGroups:
      - apps
    resources:
      - statefulsets/status
    verbs:
      - update
  - apiGroups:
      - rollout-operator.grafana.com
    resources:
      - zoneawarepoddisruptionbudgets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - rollout-operator.grafana.com
    resources:
      - replicatemplates/scale
      - replicatemplates/status
    verbs:
      - get
      - patch

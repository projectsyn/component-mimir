apiVersion: v1
kind: Service
metadata:
  annotations: {}
  labels:
    app.kubernetes.io/component: query-scheduler
    app.kubernetes.io/instance: preset-large
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/version: 2.17.0
    helm.sh/chart: mimir-distributed-5.8.0
    prometheus.io/service-monitor: 'false'
  name: preset-large-mimir-query-scheduler-headless
  namespace: preset-large
spec:
  clusterIP: None
  ports:
    - name: http-metrics
      port: 8080
      protocol: TCP
      targetPort: http-metrics
    - name: grpc
      port: 9095
      protocol: TCP
      targetPort: grpc
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/component: query-scheduler
    app.kubernetes.io/instance: preset-large
    app.kubernetes.io/name: mimir
  type: ClusterIP

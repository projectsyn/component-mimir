apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/component: querier
    app.kubernetes.io/instance: preset-large
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/part-of: memberlist
    app.kubernetes.io/version: 3.0.4
    helm.sh/chart: mimir-distributed-6.0.6
  name: preset-large-mimir-querier
  namespace: preset-large
spec:
  endpoints:
    - port: http-metrics
      relabelings:
        - action: replace
          replacement: preset-large/querier
          sourceLabels:
            - job
          targetLabel: job
        - action: replace
          replacement: preset-large
          targetLabel: cluster
      scheme: http
  namespaceSelector:
    matchNames:
      - preset-large
  selector:
    matchExpressions:
      - key: prometheus.io/service-monitor
        operator: NotIn
        values:
          - 'false'
    matchLabels:
      app.kubernetes.io/component: querier
      app.kubernetes.io/instance: preset-large
      app.kubernetes.io/name: mimir

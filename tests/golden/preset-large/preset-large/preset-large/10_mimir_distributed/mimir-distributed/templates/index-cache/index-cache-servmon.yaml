apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/component: index-cache
    app.kubernetes.io/instance: preset-large
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/version: 2.17.0
    helm.sh/chart: mimir-distributed-5.8.0
  name: preset-large-mimir-index-cache
  namespace: preset-large
spec:
  endpoints:
    - port: http-metrics
      relabelings:
        - action: replace
          replacement: preset-large/index-cache
          sourceLabels:
            - job
          targetLabel: job
        - action: replace
          replacement: preset-large
          targetLabel: cluster
      scheme: http
  namespaceSelector:
    matchNames:
      - preset-large
  selector:
    matchExpressions:
      - key: prometheus.io/service-monitor
        operator: NotIn
        values:
          - 'false'
    matchLabels:
      app.kubernetes.io/component: index-cache
      app.kubernetes.io/instance: preset-large
      app.kubernetes.io/name: mimir

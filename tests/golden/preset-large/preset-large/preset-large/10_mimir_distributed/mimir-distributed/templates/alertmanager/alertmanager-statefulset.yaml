apiVersion: apps/v1
kind: StatefulSet
metadata:
  annotations: {}
  labels:
    app.kubernetes.io/component: alertmanager
    app.kubernetes.io/instance: preset-large
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/part-of: memberlist
    app.kubernetes.io/version: 2.17.0
    helm.sh/chart: mimir-distributed-5.8.0
  name: preset-large-mimir-alertmanager
  namespace: preset-large
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: alertmanager
      app.kubernetes.io/instance: preset-large
      app.kubernetes.io/name: mimir
  serviceName: preset-large-mimir-alertmanager
  template:
    metadata:
      annotations:
        bucketSecretVersion: '0'
        checksum/alertmanager-fallback-config: 88fd085b43bb1416d181f54be80147d1f9f8d31f4d479b94a72f018b6a32f881
        checksum/config: 84fcdb6c2d60115a12adee5de8904fc286ce24193d2270e4d300da1490483d10
      labels:
        app.kubernetes.io/component: alertmanager
        app.kubernetes.io/instance: preset-large
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: mimir
        app.kubernetes.io/part-of: memberlist
        app.kubernetes.io/version: 2.17.0
        helm.sh/chart: mimir-distributed-5.8.0
      namespace: preset-large
    spec:
      containers:
        - args:
            - -target=alertmanager
            - -config.expand-env=true
            - -config.file=/etc/mimir/mimir.yaml
            - -server.http-idle-timeout=6m
          envFrom:
            - secretRef:
                name: preset-large-bucket-secret
          image: docker.io/grafana/mimir:2.17.0
          imagePullPolicy: IfNotPresent
          livenessProbe: null
          name: alertmanager
          ports:
            - containerPort: 8080
              name: http-metrics
              protocol: TCP
            - containerPort: 9095
              name: grpc
              protocol: TCP
            - containerPort: 7946
              name: memberlist
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 45
          resources:
            limits:
              memory: 1.4Gi
            requests:
              cpu: 1
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /etc/mimir
              name: config
            - mountPath: /var/mimir
              name: runtime-config
            - mountPath: /data
              name: storage
            - mountPath: /configs/
              name: alertmanager-fallback-config
            - mountPath: /tmp
              name: tmp
            - mountPath: /active-query-tracker
              name: active-queries
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: preset-large-mimir
      terminationGracePeriodSeconds: 900
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: alertmanager
              app.kubernetes.io/instance: preset-large
              app.kubernetes.io/name: mimir
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
      volumes:
        - configMap:
            items:
              - key: mimir.yaml
                path: mimir.yaml
            name: preset-large-mimir-config
          name: config
        - configMap:
            name: preset-large-mimir-runtime
          name: runtime-config
        - emptyDir: {}
          name: tmp
        - emptyDir: {}
          name: active-queries
        - configMap:
            name: preset-large-mimir-alertmanager-fallback-config
          name: alertmanager-fallback-config
  updateStrategy:
    type: RollingUpdate
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

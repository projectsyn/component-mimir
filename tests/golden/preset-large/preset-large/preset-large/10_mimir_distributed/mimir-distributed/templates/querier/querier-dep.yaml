apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: {}
  labels:
    app.kubernetes.io/component: querier
    app.kubernetes.io/instance: preset-large
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/part-of: memberlist
    app.kubernetes.io/version: 3.0.4
    helm.sh/chart: mimir-distributed-6.0.6
  name: preset-large-mimir-querier
  namespace: preset-large
spec:
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/component: querier
      app.kubernetes.io/instance: preset-large
      app.kubernetes.io/name: mimir
  strategy:
    rollingUpdate:
      maxSurge: 15%
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        bucketSecretVersion: '0'
        checksum/config: 9a9f85dce49a4f6831d88abe2aea257340af01462599d3d81b370e224161ea40
      labels:
        app.kubernetes.io/component: querier
        app.kubernetes.io/instance: preset-large
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: mimir
        app.kubernetes.io/part-of: memberlist
        app.kubernetes.io/version: 3.0.4
        helm.sh/chart: mimir-distributed-6.0.6
    spec:
      containers:
        - args:
            - -target=querier
            - -config.expand-env=true
            - -config.file=/etc/mimir/mimir.yaml
            - -querier.store-gateway-client.grpc-max-recv-msg-size=209715200
          env:
            - name: GOMAXPROCS
              value: '6'
          envFrom:
            - secretRef:
                name: preset-large-bucket-secret
          image: docker.io/grafana/mimir:3.0.4
          imagePullPolicy: IfNotPresent
          livenessProbe: null
          name: querier
          ports:
            - containerPort: 8080
              name: http-metrics
              protocol: TCP
            - containerPort: 9095
              name: grpc
              protocol: TCP
            - containerPort: 7946
              name: memberlist
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 45
          resources:
            limits:
              memory: 8.5Gi
            requests:
              cpu: 2
              memory: 6Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /etc/mimir
              name: config
            - mountPath: /var/mimir
              name: runtime-config
            - mountPath: /data
              name: storage
            - mountPath: /active-query-tracker
              name: active-queries
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: preset-large-mimir
      terminationGracePeriodSeconds: 180
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: querier
              app.kubernetes.io/instance: preset-large
              app.kubernetes.io/name: mimir
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
      volumes:
        - configMap:
            items:
              - key: mimir.yaml
                path: mimir.yaml
            name: preset-large-mimir-config
          name: config
        - configMap:
            name: preset-large-mimir-runtime
          name: runtime-config
        - emptyDir: {}
          name: storage
        - emptyDir: {}
          name: active-queries

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/component: metadata-cache
    app.kubernetes.io/instance: defaults
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/version: 2.17.0
    helm.sh/chart: mimir-distributed-5.8.0
  name: defaults-mimir-metadata-cache
  namespace: defaults
spec:
  endpoints:
    - port: http-metrics
      relabelings:
        - action: replace
          replacement: defaults/metadata-cache
          sourceLabels:
            - job
          targetLabel: job
        - action: replace
          replacement: defaults
          targetLabel: cluster
      scheme: http
  namespaceSelector:
    matchNames:
      - defaults
  selector:
    matchExpressions:
      - key: prometheus.io/service-monitor
        operator: NotIn
        values:
          - 'false'
    matchLabels:
      app.kubernetes.io/component: metadata-cache
      app.kubernetes.io/instance: defaults
      app.kubernetes.io/name: mimir

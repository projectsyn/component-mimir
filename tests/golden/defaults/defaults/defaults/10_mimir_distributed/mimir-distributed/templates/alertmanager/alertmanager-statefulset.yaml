apiVersion: apps/v1
kind: StatefulSet
metadata:
  annotations: {}
  labels:
    app.kubernetes.io/component: alertmanager
    app.kubernetes.io/instance: defaults
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/part-of: memberlist
    app.kubernetes.io/version: 3.0.4
    helm.sh/chart: mimir-distributed-6.0.6
  name: defaults-mimir-alertmanager
  namespace: defaults
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: alertmanager
      app.kubernetes.io/instance: defaults
      app.kubernetes.io/name: mimir
  serviceName: defaults-mimir-alertmanager
  template:
    metadata:
      annotations:
        bucketSecretVersion: '0'
        checksum/alertmanager-fallback-config: c953efa6d84724959e58399be78f5ee44de06ea7065858fec978aaaafdd74f7c
        checksum/config: 6e6b408ae41f31407420c949fc7510a67132350d9fb734eef6777f6af2a640ff
      labels:
        app.kubernetes.io/component: alertmanager
        app.kubernetes.io/instance: defaults
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: mimir
        app.kubernetes.io/part-of: memberlist
        app.kubernetes.io/version: 3.0.4
        helm.sh/chart: mimir-distributed-6.0.6
      namespace: defaults
    spec:
      containers:
        - args:
            - -target=alertmanager
            - -config.expand-env=true
            - -config.file=/etc/mimir/mimir.yaml
            - -server.http-idle-timeout=6m
          env: []
          envFrom:
            - secretRef:
                name: defaults-bucket-secret
          image: docker.io/grafana/mimir:3.0.4
          imagePullPolicy: IfNotPresent
          livenessProbe: null
          name: alertmanager
          ports:
            - containerPort: 8080
              name: http-metrics
              protocol: TCP
            - containerPort: 9095
              name: grpc
              protocol: TCP
            - containerPort: 7946
              name: memberlist
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 45
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /etc/mimir
              name: config
            - mountPath: /var/mimir
              name: runtime-config
            - mountPath: /data
              name: storage
            - mountPath: /configs/
              name: alertmanager-fallback-config
            - mountPath: /tmp
              name: tmp
            - mountPath: /active-query-tracker
              name: active-queries
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: defaults-mimir
      terminationGracePeriodSeconds: 900
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: alertmanager
              app.kubernetes.io/instance: defaults
              app.kubernetes.io/name: mimir
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
      volumes:
        - configMap:
            items:
              - key: mimir.yaml
                path: mimir.yaml
            name: defaults-mimir-config
          name: config
        - configMap:
            name: defaults-mimir-runtime
          name: runtime-config
        - emptyDir: {}
          name: tmp
        - emptyDir: {}
          name: active-queries
        - configMap:
            name: defaults-mimir-alertmanager-fallback-config
          name: alertmanager-fallback-config
  updateStrategy:
    type: RollingUpdate
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

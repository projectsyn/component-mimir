apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/component: overrides-exporter
    app.kubernetes.io/instance: defaults
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/version: 3.0.4
    helm.sh/chart: mimir-distributed-6.0.6
  name: defaults-mimir-overrides-exporter
  namespace: defaults
spec:
  endpoints:
    - port: http-metrics
      relabelings:
        - action: replace
          replacement: defaults/overrides-exporter
          sourceLabels:
            - job
          targetLabel: job
        - action: replace
          replacement: defaults
          targetLabel: cluster
      scheme: http
  namespaceSelector:
    matchNames:
      - defaults
  selector:
    matchExpressions:
      - key: prometheus.io/service-monitor
        operator: NotIn
        values:
          - 'false'
    matchLabels:
      app.kubernetes.io/component: overrides-exporter
      app.kubernetes.io/instance: defaults
      app.kubernetes.io/name: mimir

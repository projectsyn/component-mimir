apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/component: query-frontend
    app.kubernetes.io/instance: preset-small
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/version: 3.0.4
    helm.sh/chart: mimir-distributed-6.0.6
  name: preset-small-mimir-query-frontend
  namespace: preset-small
spec:
  endpoints:
    - port: http-metrics
      relabelings:
        - action: replace
          replacement: preset-small/query-frontend
          sourceLabels:
            - job
          targetLabel: job
        - action: replace
          replacement: preset-small
          targetLabel: cluster
      scheme: http
  namespaceSelector:
    matchNames:
      - preset-small
  selector:
    matchExpressions:
      - key: prometheus.io/service-monitor
        operator: NotIn
        values:
          - 'false'
    matchLabels:
      app.kubernetes.io/component: query-frontend
      app.kubernetes.io/instance: preset-small
      app.kubernetes.io/name: mimir

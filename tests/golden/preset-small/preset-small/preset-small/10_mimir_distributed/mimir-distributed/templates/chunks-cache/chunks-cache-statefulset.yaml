apiVersion: apps/v1
kind: StatefulSet
metadata:
  annotations: {}
  labels:
    app.kubernetes.io/component: memcached
    app.kubernetes.io/instance: preset-small
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/version: 3.0.4
    helm.sh/chart: mimir-distributed-6.0.6
  name: preset-small-mimir-chunks-cache
  namespace: preset-small
spec:
  podManagementPolicy: Parallel
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: chunks-cache
      app.kubernetes.io/instance: preset-small
      app.kubernetes.io/name: mimir
  serviceName: preset-small-mimir-chunks-cache
  template:
    metadata:
      annotations:
        bucketSecretVersion: '0'
      labels:
        app.kubernetes.io/component: chunks-cache
        app.kubernetes.io/instance: preset-small
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: mimir
        app.kubernetes.io/version: 3.0.4
        helm.sh/chart: mimir-distributed-6.0.6
    spec:
      containers:
        - args:
            - -m 8192
            - --extended=modern
            - -I 1m
            - -c 16384
            - -v
            - -u 11211
          envFrom:
            - secretRef:
                name: preset-small-bucket-secret
          image: docker.io/library/memcached:1.6.39-alpine
          imagePullPolicy: IfNotPresent
          name: memcached
          ports:
            - containerPort: 11211
              name: client
          resources:
            limits:
              memory: 9830Mi
            requests:
              cpu: 500m
              memory: 9830Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts: null
        - args:
            - --memcached.address=localhost:11211
            - --web.listen-address=0.0.0.0:9150
          image: docker.io/prom/memcached-exporter:v0.15.3
          imagePullPolicy: IfNotPresent
          name: exporter
          ports:
            - containerPort: 9150
              name: http-metrics
          resources:
            limits:
              memory: 250Mi
            requests:
              cpu: 50m
              memory: 50Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: preset-small-mimir
      terminationGracePeriodSeconds: 30
      volumes: null
  updateStrategy:
    type: RollingUpdate

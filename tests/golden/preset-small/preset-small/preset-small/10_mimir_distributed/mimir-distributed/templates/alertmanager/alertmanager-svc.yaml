apiVersion: v1
kind: Service
metadata:
  annotations: {}
  labels:
    app.kubernetes.io/component: alertmanager
    app.kubernetes.io/instance: preset-small
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mimir
    app.kubernetes.io/part-of: memberlist
    app.kubernetes.io/version: 3.0.4
    helm.sh/chart: mimir-distributed-6.0.6
  name: preset-small-mimir-alertmanager
  namespace: preset-small
spec:
  internalTrafficPolicy: Cluster
  ports:
    - name: http-metrics
      port: 8080
      protocol: TCP
      targetPort: http-metrics
